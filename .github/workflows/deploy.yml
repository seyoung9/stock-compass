name: build-and-deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/15 * * * *"   # 15분마다 갱신 (무료 한계점; Finnhub 무료는 15~20분 지연 데이터)
  workflow_dispatch: {}    # 수동 실행 버튼

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 시세·뉴스 수집 → public/data.json 생성
      # ANTHROPIC_API_KEY 시크릿이 있으면 뉴스 'why'를 Claude가 생성(선택).
      - name: Fetch live data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
        run: npm run fetch

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
